<div class="form-container">
  <div class="form-header">
    <a routerLink="/offers" class="back-link">← Обратно</a>
    <h1>Нова оферта</h1>
    <p>Предложи умение и намери какво да научиш</p>
  </div>
  <div class="form-card">
    <form [formGroup]="offerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="title">Заглавие *</label>
        <input
          id="title"
          type="text"
          formControlName="title"
          placeholder="пр. Python уроци за китара"
          [class.invalid]="title?.invalid && title?.touched"/>
        <span class="error-msg" *ngIf="title?.invalid && title?.touched">
          <span *ngIf="title?.errors?.['required']">Заглавието е задължително</span>
          <span *ngIf="title?.errors?.['minlength']">Минимум 5 символа</span>
        </span>
      </div>
      <div class="form-group">
        <label for="category">Категория *</label>
        <select
          id="category"
          formControlName="category"
          [class.invalid]="category?.invalid && category?.touched">
          <option value="">-- Избери категория --</option>
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
        <span class="error-msg" *ngIf="category?.invalid && category?.touched">
          Моля избери категория
        </span>
      </div>
      <div class="swap-fields">
        <div class="form-group">
          <label for="offering">Какво предлагам *</label>
          <input
            id="offering"
            type="text"
            formControlName="offering"
            placeholder="пр. 1 час Python урок"
            [class.invalid]="offering?.invalid && offering?.touched"/>
          <span class="error-msg" *ngIf="offering?.invalid && offering?.touched">
            <span *ngIf="offering?.errors?.['required']">Полето е задължително</span>
            <span *ngIf="offering?.errors?.['minlength']">Минимум 3 символа</span>
          </span>
        </div>
        <div class="swap-divider">⇄</div>
        <div class="form-group">
          <label for="seeking">Какво търся *</label>
          <input
            id="seeking"
            type="text"
            formControlName="seeking"
            placeholder="пр. 1 час китара урок"
            [class.invalid]="seeking?.invalid && seeking?.touched"/>
          <span class="error-msg" *ngIf="seeking?.invalid && seeking?.touched">
            <span *ngIf="seeking?.errors?.['required']">Полето е задължително</span>
            <span *ngIf="seeking?.errors?.['minlength']">Минимум 3 символа</span>
          </span>
        </div>
      </div>
      <div class="form-group">
        <label for="description">Описание *</label>
        <textarea
          id="description"
          formControlName="description"
          rows="5"
          placeholder="Разкажи повече за себе си, твоето ниво, наличност и какво очакваш от размяната..."
          [class.invalid]="description?.invalid && description?.touched">
        </textarea>
        <span class="error-msg" *ngIf="description?.invalid && description?.touched">
          <span *ngIf="description?.errors?.['required']">Описанието е задължително</span>
          <span *ngIf="description?.errors?.['minlength']">Минимум 20 символа</span>
        </span>
      </div>
      <div class="error-msg server-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="isLoading">
          {{ isLoading ? 'Създаване...' : '✅ Публикувай оферта' }}
        </button>
        <a routerLink="/offers" class="btn-secondary">Откажи</a>
    </div>
    </form>
  </div>
</div>
